<!DOCTYPE html>
<html>
<head>
    <title>CCMS E2E 测试</title>
    <script>
        async function testEndpoint(url, method = 'GET') {
            try {
                const response = await fetch(url, { method: method });
                const data = await response.text();
                return {
                    status: response.status,
                    statusText: response.statusText,
                    data: data
                };
            } catch (error) {
                return {
                    error: error.message
                };
            }
        }

        async function runTests() {
            const results = document.getElementById('results');
            results.innerHTML = '<h3>E2E 测试结果</h3>';

            // 测试根路径
            const rootTest = await testEndpoint('http://localhost:8280/');
            displayResult('根路径 (/)', rootTest);

            // 测试 index.html
            const indexTest = await testEndpoint('http://localhost:8280/index.html');
            displayResult('/index.html', indexTest);

            // 测试静态资源
            const staticTest = await testEndpoint('http://localhost:8280/js/index.js');
            displayResult('/js/index.js (静态资源)', staticTest);

            // 测试登录API
            const loginTest = await testEndpoint('http://localhost:8280/api/auth/login', 'POST');
            displayResult('/api/auth/login (POST)', loginTest);
        }

        function displayResult(name, result) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.innerHTML = `<strong>${name}:</strong><br>
            ${result.error ? '❌ 连接错误: ' + result.error : 
              result.status === 200 ? '✅ 成功 (200)' : 
              `⚠️ 状态: ${result.status} ${result.statusText}`}<br>
            ${result.data ? '响应预览: ' + result.data.substring(0, 200) + '...' : ''}<br><br>`;
            results.appendChild(div);
        }
    </script>
</head>
<body onload="runTests()">
    <h2>CCMS 端到端验证测试</h2>
    <div id="results">测试中...</div>
</body>
</html>
