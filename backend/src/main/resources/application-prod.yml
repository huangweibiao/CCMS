# CCMS生产环境配置文件
spring:
  # 数据源配置
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ccms_prod}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:ccms_user}
    password: ${DB_PASSWORD:ccms_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # 连接池配置
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: Asia/Shanghai
  
  # 缓存配置
  cache:
    type: redis
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

# 服务器配置
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

# JWT配置
jwt:
  secret: ${JWT_SECRET:ccms-prod-jwt-secret-key-2025-enterprise-cost-management-system}
  expiration: ${JWT_EXPIRATION:3600}
  
# 文件存储配置
file:
  upload-path: ${FILE_UPLOAD_PATH:/data/ccms/uploads/}
  max-size: 20971520
  
# 系统初始化配置
init:
  data: false
  
# 生产环境特殊配置
prod:
  cors:
    allowed-origins: "${CORS_ORIGINS:http://your-domain.com}"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
    allowed-headers: "*"
    
# 日志配置
logging:
  level:
    com.ccms: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: /data/ccms/logs/ccms.log
    max-size: 10MB
    max-history: 30