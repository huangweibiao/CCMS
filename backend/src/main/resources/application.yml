# CCMS企业级费控管理系统主配置文件
spring:
  profiles:
    active: dev
  
# 应用配置
app:
  name: CCMS
  version: 1.0.0
  description: 企业级费控管理系统
  # JWT配置
  jwt:
    secret: ccms-jwt-secret-key-2024-changeme-in-production
    expiration: 86400000  # 24小时
    prefix: "Bearer "
    header: "Authorization"
  # 安全配置
  security:
    anonymous-paths: "/api/auth/login,/api/auth/register,/api/auth/refresh,/api/auth/logout,/api/public/**"
    require-permission-paths: "/api/admin/**"
    require-role-paths: "/api/super-admin/**"

# 日志配置
logging:
  level:
    com.ccms: INFO
    # 权限系统详细日志
    com.ccms.controller.system: DEBUG
    com.ccms.service.impl: DEBUG
    com.ccms.service.UserService: DEBUG
    com.ccms.service.impl.UserServiceImpl: DEBUG
    com.ccms.controller.system.AuthController: DEBUG
    com.ccms.controller.system.PermissionController: DEBUG
    com.ccms.controller.system.UserController: DEBUG
    com.ccms.controller.system.MenuController: DEBUG
    com.ccms.controller.system.RoleController: DEBUG
    
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: DEBUG
  file:
    name: logs/ccms.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg [userId=%X{userId},sessionId=%X{sessionId}]%n"
    
# 权限系统监控配置
monitoring:
  permission:
    # 权限验证响应时间阈值（毫秒）
    validation-timeout-ms: 500
    # 登录失败告警阈值（次数）
    login-failure-alert-threshold: 5
    # 权限变更记录保留天数
    permission-change-logs-retention-days: 90
    # 菜单访问日志级别
    menu-access-log-level: INFO

# CORS跨域配置（分环境配置）
cors:
  # 开发环境配置
  dev:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD"
    allowed-headers: "Origin,X-Requested-With,Content-Type,Accept,Authorization,X-CSRF-Token"
    exposed-headers: "Authorization,Content-Disposition"
    allow-credentials: true
    max-age: 3600
  
  # 生产环境配置  
  prod:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:}"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD"
    allowed-headers: "Origin,X-Requested-With,Content-Type,Accept,Authorization,X-CSRF-Token,X-Request-ID"
    exposed-headers: "Authorization,Content-Disposition,X-Request-ID"
    allow-credentials: true
    max-age: 3600