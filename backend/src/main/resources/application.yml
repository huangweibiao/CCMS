# CCMS企业级费控管理系统主配置文件
spring:
  profiles:
    active: dev
  
# 应用配置
app:
  name: CCMS
  version: 1.0.0
  description: 企业级费控管理系统

# 日志配置
logging:
  level:
    com.ccms: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: DEBUG
  file:
    name: logs/ccms.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# CORS跨域配置（分环境配置）
cors:
  # 开发环境配置
  dev:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD"
    allowed-headers: "Origin,X-Requested-With,Content-Type,Accept,Authorization,X-CSRF-Token"
    exposed-headers: "Authorization,Content-Disposition"
    allow-credentials: true
    max-age: 3600
  
  # 生产环境配置  
  prod:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:}"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD"
    allowed-headers: "Origin,X-Requested-With,Content-Type,Accept,Authorization,X-CSRF-Token,X-Request-ID"
    exposed-headers: "Authorization,Content-Disposition,X-Request-ID"
    allow-credentials: true
    max-age: 3600